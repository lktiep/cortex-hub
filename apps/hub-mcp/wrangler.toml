# Cortex Hub MCP Server
name = "cortex-hub-mcp"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Enable workers.dev subdomain
workers_dev = true

# Custom domain route (cortex.local zone must be on this CF account)
# routes = [{ pattern = "mcp.hub.cortex.local", custom_domain = true }]

[vars]
# Backend service URLs
QDRANT_URL = "http://localhost:6333"
MEM9_URL = "http://localhost:8319"
CLIPROXY_URL = "http://localhost:8317"
DASHBOARD_API_URL = "http://localhost:4000"

# MCP Server metadata
MCP_SERVER_NAME = "cortex-hub"
MCP_SERVER_VERSION = "0.1.0"
